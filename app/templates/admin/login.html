<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>دخول الإدارة — ORYA</title>
  <link rel="icon" href="{{ url_for('static', filename='images/icon with out back.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/icon with out back.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <style>
    /* ── Login page overrides ─────────────────────── */
    .admin-body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--charcoal);
      overflow: auto;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
    }

    .login-card {
      background: #1e1e1e;
      border: 1px solid rgba(201,169,110,0.2);
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo-wrap {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo {
      height: 52px;
      object-fit: contain;
    }

    .login-logo-fallback {
      font-family: 'Georgia', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 4px;
    }

    .login-subtitle {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: rgba(245,240,235,0.5);
      letter-spacing: 1px;
    }

    .login-form .form-group {
      margin-bottom: 20px;
    }

    .login-form label {
      display: block;
      font-size: 13px;
      color: rgba(245,240,235,0.7);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .login-form input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 8px;
      color: #F5F0EB;
      font-size: 15px;
      font-family: inherit;
      transition: border-color var(--transition-fast),
                  box-shadow var(--transition-fast);
      box-sizing: border-box;
      direction: ltr;
      text-align: right;
    }

    .login-form input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.15);
    }

    .login-form input::placeholder {
      color: rgba(245,240,235,0.3);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: #1e1e1e;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.5px;
      transition: background var(--transition-fast),
                  transform 100ms ease,
                  box-shadow var(--transition-fast);
    }

    .login-btn:hover {
      background: var(--gold-dark);
      box-shadow: 0 4px 16px rgba(201,169,110,0.4);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Flash / error alert */
    .login-alert {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      animation: fadeUp 0.3s ease both;
    }

    .login-alert-error {
      background: rgba(192,57,43,0.15);
      border: 1px solid rgba(192,57,43,0.4);
      color: #ff6b6b;
    }

    .login-alert-success {
      background: rgba(46,125,50,0.15);
      border: 1px solid rgba(46,125,50,0.4);
      color: #69f0ae;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(245,240,235,0.3);
    }

    /* Lock icon decoration */
    .login-lock {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(201,169,110,0.12);
      margin: 0 auto 16px;
    }

    .login-lock svg {
      stroke: var(--gold);
    }
  </style>
</head>
<body class="admin-body">

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo-wrap">
        <div class="login-lock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               width="22" height="22">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <img src="{{ url_for('static', filename='images/logo/orya-logo-white.png') }}"
             alt="ORYA" class="login-logo"
             onerror="this.style.display='none';
                      document.getElementById('logo-fallback').style.display='block'">
        <span id="logo-fallback" class="login-logo-fallback" style="display:none">ORYA</span>
        <span class="login-subtitle">لوحة التحكم الإدارية</span>
      </div>

      <!-- Alerts -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="login-alert login-alert-{{ 'error' if category == 'error' else category }}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   width="16" height="16">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Login Form -->
      <form class="login-form" method="POST" action="/admin/login" id="login-form">
        <input type="hidden" name="csrf_token"
               value="{{ csrf_token() if csrf_token is defined else '' }}">

        <div class="form-group">
          <label for="username">اسم المستخدم</label>
          <input type="text"
                 id="username"
                 name="username"
                 placeholder="admin"
                 autocomplete="username"
                 required
                 autofocus>
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password"
                 id="password"
                 name="password"
                 placeholder="••••••••"
                 autocomplete="current-password"
                 required>
        </div>

        <button type="submit" class="login-btn" id="login-submit">
          دخول لوحة التحكم
        </button>
      </form>

      <p class="login-footer">ORYA Admin &copy; {{ 2024 }}</p>
    </div>
  </div>

  <script>
    // Prevent double-submit
    document.getElementById('login-form').addEventListener('submit', function() {
      const btn = document.getElementById('login-submit');
      btn.disabled = true;
      btn.textContent = 'جاري الدخول...';
    });
  </script>
</body>
</html>
