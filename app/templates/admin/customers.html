{% extends "admin/base_admin.html" %}
{% set active = 'customers' %}

{% block title %}<span data-i18n="admin_customers">العملاء</span> — ORYA Admin{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="admin_customers_title">إدارة العملاء</h1>
    <p class="page-subtitle" id="customers-summary" data-i18n="admin_customers_subtitle">قائمة المستخدمين المسجلين وتاريخ معاملاتهم</p>
  </div>
</div>

<!-- SEARCH & FILTERS -->
<div class="filter-bar">
  <div class="search-wrap" style="flex: 1; min-width: 300px;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" class="search-input" id="search-input" 
           data-i18n-placeholder="search_customer_placeholder" placeholder="البحث بالاسم، البريد الإلكتروني، أو رقم الهاتف..." oninput="onSearchInput()">
  </div>
</div>

<!-- CUSTOMERS TABLE -->
<div class="table-card">
  <div id="customers-table-wrap">
    <div class="loading-row"><div class="spinner"></div></div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;
let searchTimer = null;

function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadCustomers(1), 400);
}

async function loadCustomers(page = 1) {
  currentPage = page;
  const searchInput = document.getElementById('search-input');
  
  const params = new URLSearchParams({
    page: page,
    per_page: 20,
    search: searchInput.value.trim()
  });

  const wrap = document.getElementById('customers-table-wrap');
  wrap.innerHTML = '<div class="loading-row"><div class="spinner"></div></div>';

  try {
    const data = await Admin.adminFetch('/admin/api/customers?' + params.toString());
    const customers = data.customers || [];
    const total = data.total || 0;
    const pages = data.pages || 1;

    document.getElementById('customers-summary').innerHTML = `${t('admin_customers_subtitle')} (${total} ${t('total_customers_text')})`;

    if (customers.length === 0) {
      wrap.innerHTML = `<div class="table-empty" data-i18n="no_customers_found">${t('no_customers_found')}</div>`;
      return;
    }

    wrap.innerHTML = `
      <table class="admin-table">
        <thead>
          <tr>
            <th data-i18n="table_username">${t('table_username')}</th>
            <th data-i18n="table_full_name">${t('table_full_name')}</th>
            <th data-i18n="table_email">${t('table_email')}</th>
            <th data-i18n="table_phone_cust">${t('table_phone_cust')}</th>
            <th data-i18n="table_reg_date">${t('table_reg_date')}</th>
            <th data-i18n="table_orders_count">${t('table_orders_count')}</th>
            <th data-i18n="table_spent">${t('table_spent')}</th>
            <th style="text-align: center;" data-i18n="table_view">${t('table_view')}</th>
          </tr>
        </thead>
        <tbody>
          ${customers.map(c => `
            <tr>
              <td><span style="font-weight: 600; color: var(--gold);">@${c.username}</span></td>
              <td>${c.full_name || '—'}</td>
              <td dir="ltr" style="text-align: right; font-size: 13px;">${c.email}</td>
              <td dir="ltr" style="text-align: right;">${c.phone || '—'}</td>
              <td>${new Date(c.created_at).toLocaleDateString(currentLang === 'ar' ? 'ar-JO' : 'en-US')}</td>
              <td style="text-align: center;">${c.orders_count || 0}</td>
              <td style="font-weight: 700;">${parseFloat(c.total_spent || 0).toFixed(3)} JOD</td>
              <td style="text-align: center;">
                <a href="/admin/customers/${c.id}" class="btn-icon primary" data-i18n-title="table_view">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </a>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;

    renderPagination(page, pages);

  } catch (e) {
    console.error('Customers load error:', e);
    Admin.showToast(t('error_loading_customers') || 'Error loading customers data', 'error');
  }
}

function renderPagination(current, total) {
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="loadCustomers(${current-1})" ${current===1?'disabled':''}>›</button>`;
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || (i >= current - 1 && i <= current + 1)) {
      html += `<button class="page-btn ${i===current?'active':''}" onclick="loadCustomers(${i})">${i}</button>`;
    } else if (i === current - 2 || i === current + 2) {
      html += '<span style="padding: 0 5px;">...</span>';
    }
  }
  html += `<button class="page-btn" onclick="loadCustomers(${current+1})" ${current===total?'disabled':''}>‹</button>`;
  el.innerHTML = html;
}

// Initial load
document.addEventListener('DOMContentLoaded', () => loadCustomers(1));

// Refresh on language change
window.addEventListener('languageChanged', () => {
  loadCustomers(currentPage);
});
</script>
{% endblock %}
